services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: databiz-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: databiz-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
