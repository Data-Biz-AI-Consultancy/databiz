name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: npm run test:e2e

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        known_hosts: unnecessary-but-handled-via-keyscan
        if_key_exists: replace

    - name: Add remote server to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

    - name: Rsync codebase to Hetzner Server
      run: |
        rsync -avz --delete \
          --exclude 'node_modules/' \
          --exclude '.git/' \
          --exclude '.github/' \
          --exclude 'tests/' \
          --exclude 'scratch/' \
          ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/databiz/

    - name: Restart Docker Compose on Server
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          cd /var/www/databiz && \
          docker compose up -d --build && \
          echo 'Waiting for Ollama container to initialize...' && \
          sleep 5 && \
          docker exec databiz-ollama ollama pull gemma3:4b && \
          echo 'Verifying Ollama models...' && \
          docker exec databiz-ollama ollama list && \
          echo 'Running a quick test query...' && \
          docker exec databiz-ollama ollama run gemma3:4b 'hi'
        "
